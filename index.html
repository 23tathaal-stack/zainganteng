<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Sahabat Terbaikku</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #ff9a9e, #fecfef);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #ff4b5c; font-size: 24px; }
        p { color: #555; font-size: 16px; }
        .btn-group {
            margin-top: 20px;
            position: relative;
            height: 50px;
        }
        button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #yesBtn { background-color: #4caf50; color: pink; margin-right: 10px; }
        #noBtn { background-color: #f44336; color: pink; position: absolute; }
    </style>
</head>
<body>

<div class="container">
    <h1>Hai Zain! 👋🥰</h1>
    <p>Kamu bestie terlucu aku untuk sekarang!!<33. kira kira kamu ngerasa cocok sm obrolan kita selama ini ga? </p>
    
    <div class="btn-group">
        <button id="yesBtn" onclick="alerta()">Cocok!</button>
        <button id="noBtn" onmouseover="moveButton()">Nggak</button>
    </div>
</div>

<script>
    // Membikin tombol "Nggak" otomatis pindah tempat saat didekati jari/kursor
    function moveButton() {
        const noBtn = document.getElementById('noBtn');
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
        
        noBtn.style.left = x + 'px';
        noBtn.style.top = y + 'px';
    }

    function alerta() {
        alert('Yay! Makasih ya udah mau jadi sahabat terbaikku! ❤️');
    }
</script>

</body>
</html>
